<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under (re)construction</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=DM+Serif+Display&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #e2e1dd;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
    }

    .card {
      background-color: #e2e1dd;
      /* border: 4px solid #e2af85; */
      border-radius: 4px;
      max-width: 90%;
      height: 90dvh;
      width: 100%;
      padding: 4rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s ease-out;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: #333;
      margin-bottom: 0.5rem;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 1.2rem;
      animation: fadeIn 1s ease-out 0.5s both;
    }

    .description {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #333;
      max-width: 600px;
      margin: 0 auto 2rem;
      animation: fadeIn 1s ease-out 0.7s both;
    }

    .description strong {
      color: #1a1a1a;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .btn_container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: #e2af85;
      color: #1a1a1a;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.8rem 1.6rem;
      border: none;
      cursor: pointer;
        transition: all 0.3s ease;
      animation: fadeIn 1s ease-out 0.9s both;
      width: fit-content;
       box-shadow: 5px 10px rgba(0, 0, 0, 0);
       border-radius: 10px;
       /* box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2); */
    }

    .btn:hover {
      /* background-color: #1a1a1a; */
       box-shadow: 5px 10px #1a1a1a;
      transform: translateY(-2px);
    }

    .btn svg {
      transition: transform 0.3s ease;
    }

    .btn:hover svg {
      transform: translateX(4px);
    }

    /* Doodle decorations */
    .doodles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .doodle {
      position: absolute;
      color: #e2af85;
      opacity: 0;
      animation: doodlePop 0.5s ease-out forwards;
    }

    .doodle-1 {
      top: 18%;
      left: 12%;
      font-size: 2rem;
      animation-delay: 1.2s;
      animation-name: doodlePop, doodleFloat;
      animation-duration: 0.5s, 3s;
      animation-delay: 1.2s, 1.7s;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-timing-function: ease-out, ease-in-out;
    }

    .doodle-2 {
      top: 12%;
      right: 14%;
      font-size: 1.5rem;
      animation-delay: 1.5s;
      animation-name: doodlePop, doodleFloat;
      animation-duration: 0.5s, 4s;
      animation-delay: 1.5s, 2s;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-timing-function: ease-out, ease-in-out;
    }

    .doodle-3 {
      bottom: 20%;
      right: 10%;
      font-size: 1.8rem;
      animation-delay: 1.8s;
      animation-name: doodlePop, doodleFloat;
      animation-duration: 0.5s, 3.5s;
      animation-delay: 1.8s, 2.3s;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-timing-function: ease-out, ease-in-out;
    }

    .doodle-4 {
      bottom: 18%;
      left: 10%;
      font-size: 1.6rem;
      animation-delay: 2s;
      animation-name: doodlePop, doodleFloat;
      animation-duration: 0.5s, 4.5s;
      animation-delay: 2s, 2.5s;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-timing-function: ease-out, ease-in-out;
    }

    .doodle-5 {
      top: 35%;
      right: 8%;
      font-size: 1.2rem;
      animation-delay: 2.2s;
      animation-name: doodlePop, doodleSpin;
      animation-duration: 0.5s, 6s;
      animation-delay: 2.2s, 2.7s;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
      animation-timing-function: ease-out, linear;
    }

    @keyframes doodlePop {
      from {
        opacity: 0;
        transform: scale(0.5);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes doodleFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes doodleSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 700px) {
      .card {
        max-width: 100%;
        padding: 3rem 1.5rem;
      }

      /* .doodle {
        display: none;
      } */
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="doodles">
      <span class="doodle doodle-1">?</span>
      <span class="doodle doodle-2">&gt;</span>
      <span class="doodle doodle-3">~</span>
      <span class="doodle doodle-4">&lt;</span>
      <span class="doodle doodle-5">*</span>
    </div>

    <p class="subtitle">Hang tight</p>
    <h1>Under (re)construction</h1>
    <p class="description">
      I'm behind the scenes cooking up a fresh portfolio that actually does me justice. <br>
      Back shortly with something worth clicking around!
    </p>
    <div class="btn_container">
      <a href="https://www.linkedin.com/in/alexlykesas/" target="_blank" class="btn">
        Linkedin
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      </a>
      <a href="https://github.com/alexookah" target="_blank" class="btn">
        Github
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      </a>
      <a href="https://alexlykesas.com/Alex-Lykesas.pdf" target="_blank" class="btn">
        Download CV
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      </a>
    </div>
  </div>
</body>

</html>
